<!DOCTYPE html>
<html>
<head>
  <title>Reģistrācija ekskursijai</title>

  <style>
  body {
  font-family: Arial, sans-serif;

  background-image: url("images/background.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;

  margin: 0;
  padding: 0;
  font-size: 20px;
}

/* dark overlay for readability */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: -1;
}

h2 {
  text-align: center;
  font-size: 34px;
  font-weight: 800;
  margin: 20px 0;
  color: white;
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}

.container {
  width: 100%;
  padding: 14px;
  box-sizing: border-box;
}

/* CLEAN CARD */
.slot {
  width: 100%;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  border-radius: 16px;
  padding: 18px;
  margin-bottom: 14px;

  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
}

/* HEADER */
.slot-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 22px;
  font-weight: 700;
  color: #1f2937;
}

/* badge */
.badge {
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 14px;
  background: #e5e7eb;
  color: #111;
}

.full {
  background: #ef4444;
  color: white;
}

/* progress */
.bar {
  width: 100%;
  height: 10px;
  background: #e5e7eb;
  border-radius: 999px;
  margin: 12px 0;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: #f55c00;
  width: 0%;
  transition: 0.3s ease;
}

/* info */
.info {
  font-size: 15px;
  color: #6b7280;
  margin-bottom: 14px;
}

/* BUTTON (clean dark professional) */
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  cursor: pointer;

  background: #111827;
  color: white;

  font-size: 16px;
  font-weight: 700;

  transition: 0.2s ease;
}

.btn:hover {
  background: #1f2937;
}

.btn:active {
  transform: scale(0.98);
}

.btn:disabled {
  background: #9ca3af;
  cursor: not-allowed;
}
</style>
</head>

<body>

<h2>📅 Available Slots</h2>

<div class="container" id="slots">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRVchRkNmDTfKN5meoSVLVFK-YeswY-Us",
  authDomain: "slot-booking-5df6b.firebaseapp.com",
  projectId: "slot-booking-5df6b",
  storageBucket: "slot-booking-5df6b.firebasestorage.app",
  messagingSenderId: "93670207614",
  appId: "1:93670207614:web:acb827d6a0ab0c9ba5e82f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadSlots() {
  const querySnapshot = await getDocs(collection(db, "slots"));

  let html = "";

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();

    const capacity = Number(data.capacity || 0);
    const registered = Number(data.registered || 0);
    const remaining = capacity - registered;

    const percent = capacity > 0 ? (registered / capacity) * 100 : 0;
    const isFull = registered >= capacity;

    html += `
      <div class="slot">

        <div class="slot-header">
          <div>🕒 ${data.label}</div>
          <div class="badge ${isFull ? "full" : ""}">
            ${isFull ? "FULL" : remaining + " spots"}
          </div>
        </div>

        <div class="bar">
          <div class="bar-fill" style="width:${percent}%"></div>
        </div>

        <div class="info">
          ${registered} / ${capacity} booked
        </div>

        <a href="${data.map}" target="_blank">📍 View location</a>
        <br><br>

        <button class="btn"
          ${isFull ? "disabled" : ""}
          onclick="register('${docSnap.id}', ${registered}, ${capacity})">
          ${isFull ? "Full" : "Book slot"}
        </button>

      </div>
    `;
  });

  document.getElementById("slots").innerHTML = html;
}

window.register = async function(slotId, registered, capacity) {

  if (registered >= capacity) {
    alert("Slot full");
    return;
  }

  const name = prompt("Enter your name");
  if (!name) return;

  const ref = doc(db, "slots", slotId);

  await updateDoc(ref, {
    registered: increment(1)
  });

  loadSlots();
};

loadSlots();
</script>

</body>
</html>
