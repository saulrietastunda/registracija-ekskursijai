<!DOCTYPE html>
<html>
<head>
<title>Reģistrācija ekskursija</title>

<style>
* { box-sizing: border-box; }

body {
    font-family: Arial, sans-serif;
    background-image: url("images/background.png");
    background-size: cover;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

h2 {
    text-align: center;
    font-size: 34px;
    font-weight: 800;
    color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
}

.container {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    padding: 14px;
}

.slot {
    background: rgba(255,255,255,0.85);
    border-radius: 18px;
    padding: 22px;
    margin-bottom: 20px;
}

.slot-header {
    display: flex;
    justify-content: space-between;
    font-size: 26px;
    font-weight: 800;
}

.badge {
    padding: 10px 14px;
    border-radius: 999px;
    background: #eee;
}

.full {
    background: red;
    color: white;
}

.bar {
    height: 20px;
    background: #eee;
    border-radius: 10px;
    margin: 15px 0;
    overflow: hidden;
}

.bar-fill {
    height: 100%;
    background: #4caf50;
}

.btn {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 14px;
    background: #f55c00;
    color: white;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
}

.btn:disabled {
    background: #ccc;
}
</style>
</head>

<body>

<h2>Pieejamie laiki</h2>

<div class="container" id="slots"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getFirestore,
    collection,
    doc,
    getDocs,
    updateDoc,
    increment,
    addDoc,
    runTransaction,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDRVr...",
    authDomain: "slot-booking-5df6b.firebaseapp.com",
    projectId: "slot-booking-5df6b",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   LOAD SLOTS + WAVES
========================= */
function loadSlots() {

    const slotsRef = collection(db, "slots");

    onSnapshot(slotsRef, async (snap) => {

        let html = "";

        for (const docSnap of snap.docs) {

            const slotData = docSnap.data();
            const wavesRef = collection(db, "slots", docSnap.id, "waves");
            const waveSnap = await getDocs(wavesRef);

            let waves = [];
            waveSnap.forEach(w => {
                waves.push({ id: w.id, ...w.data() });
            });

            waves.sort((a, b) => a.order - b.order);

            html += `
            <div class="slot">
                <div class="slot-header">
                    <div>${slotData.label}</div>
                </div>
            `;

            waves.forEach(wave => {

                const isFull = wave.registered >= slotData.capacity;
                const percent = (wave.registered / slotData.capacity) * 100;

                html += `
                <div style="margin-top:15px;">
                    <div class="slot-header">
                        <div>Grupa</div>
                        <div class="badge ${isFull ? "full" : ""}">
                            ${isFull ? "PILNS" : (slotData.capacity - wave.registered) + " vietas"}
                        </div>
                    </div>

                    <div class="bar">
                        <div class="bar-fill" style="width:${percent}%"></div>
                    </div>

                    <div style="margin-bottom:10px;">
                        ${wave.registered} / ${slotData.capacity}
                    </div>

                    <button class="btn" ${isFull ? "disabled" : ""}
                        onclick="register('${docSnap.id}', '${wave.id}', ${slotData.capacity})">
                        ${isFull ? "Pilns" : "Reģistrēties"}
                    </button>
                </div>
                `;
            });

            html += `</div>`;
        }

        document.getElementById("slots").innerHTML = html;
    });
}

/* =========================
   REGISTER INTO WAVE
========================= */
window.register = async function(slotId, waveId, capacity) {

    const name = prompt("Vārds:");
    if (!name) return;

    const waveRef = doc(db, "slots", slotId, "waves", waveId);
    const regRef = collection(db, "slots", slotId, "registrations");

    await runTransaction(db, async (tx) => {

        const snap = await tx.get(waveRef);
        const data = snap.data();

        if (data.registered >= capacity) {
            throw "FULL";
        }

        tx.update(waveRef, {
            registered: data.registered + 1
        });
    });

    await addDoc(regRef, {
        name,
        wave: waveId,
        time: new Date()
    });

    window.location.href = "map.html?slot=" + encodeURIComponent(waveId);
};

loadSlots();
</script>

</body>
</html>
