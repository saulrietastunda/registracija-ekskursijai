<!DOCTYPE html>
<html>
<head>
<title>Reģistrācija ekskursija</title>

<style>

* {
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-image: url("images/background.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    margin: 0;
    padding: 0;
    font-size: 22px;

    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

h2 {
    text-align: center;
    font-size: 34px;
    font-weight: 800;
    margin: 20px 0;
    color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
}

.container {
    width: 100%;
    padding: 14px;
    box-sizing: border-box;
    max-width: 900px;
    margin: 0 auto;

    opacity: 0;
    transition: opacity 0.2s ease;
}

.slot {
    width: 100%;
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(6px);
    border-radius: 18px;
    padding: 22px;
    margin-bottom: 25px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
}

.slot-header {
    display: flex;
    justify-content: space-between;
    font-size: 28px;
    font-weight: 800;
}

.badge {
    padding: 10px 14px;
    border-radius: 999px;
    font-size: 18px;
    background: #eee;
}

.full {
    background: red;
    color: white;
}

.bar {
    width: 100%;
    height: 22px;
    background: #eee;
    border-radius: 12px;
    margin: 18px 0;
    overflow: hidden;
}

.bar-fill {
    height: 100%;
    background: #4caf50;
}

.btn {
    width: 100%;
    padding: 22px;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    background: #f55c00;
    color: white;
    font-size: 22px;
    font-weight: 800;
}

.btn:disabled {
    background: #ccc;
}

</style>
</head>

<body>

<h2>Pieejamie laiki</h2>

<div class="container" id="slots"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getFirestore,
    collection,
    doc,
    addDoc,
    runTransaction,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDRVr...",
    authDomain: "slot-booking-5df6b.firebaseapp.com",
    projectId: "slot-booking-5df6b",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function loadSlots() {

    const slotsRef = collection(db, "slots");

    onSnapshot(slotsRef, (snap) => {

        let html = "";

        snap.forEach((docSnap) => {

            const data = docSnap.data();

            const capacity = data.capacity;
            const registered = data.registered;
            const remaining = capacity - registered;
            const percent = (registered / capacity) * 100;
            const isFull = registered >= capacity;

            html += `
            <div class="slot">

                <div class="slot-header">
                    <div>${data.label}</div>
                    <div class="badge ${isFull ? "full" : ""}">
                        ${isFull ? "0 vietas" : remaining + " vietas"}
                    </div>
                </div>

                <div class="bar">
                    <div class="bar-fill" style="width:${percent}%"></div>
                </div>

                <div style="margin-bottom:15px;">
                    ${registered} / ${capacity} reģistrēti
                </div>

                <button class="btn" ${isFull ? "disabled" : ""}
                    onclick="register(
                        '${docSnap.id}',
                        ${registered},
                        ${capacity},
                        '${data.label}'
                    )">
                    ${isFull ? "Reģistrācija noslēgusies" : "Reģistrēties"}
                </button>

            </div>
            `;
        });

        const container = document.getElementById("slots");
        container.innerHTML = html;
        container.style.opacity = "1";
    });
}

window.register = async function(slotId, registered, capacity, label) {

    const firstName = prompt("Vārds:");
    if (!firstName) return;

    const slotRef = doc(db, "slots", slotId);
    const regRef = collection(db, "slots", slotId, "registrations");

    try {
        await runTransaction(db, async (transaction) => {

            const slotDoc = await transaction.get(slotRef);

            const currentRegistered = slotDoc.data().registered;

            if (currentRegistered >= capacity) {
                throw "Slot is full";
            }

            transaction.update(slotRef, {
                registered: currentRegistered + 1
            });
        });

        await addDoc(regRef, {
            name: firstName,
            registeredAt: new Date()
        });

        window.location.href =
            "map.html?slot=" + encodeURIComponent(label);

        
    } catch (e) {
        alert("Šis laiks ir pilns");
    }
};

loadSlots();

</script>

</body>
</html>
