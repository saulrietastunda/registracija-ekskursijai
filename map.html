<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Event Map</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url("images/background.png");
    background-size:cover;
}

/* CENTER CARD */
.container{
    background:rgba(255,255,255,0.85);
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:700px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* ONLY SLOT TEXT */
.time{
    font-size:34px;
    font-weight:900;
    color:#f55c00;
    margin-bottom:20px;
}

/* MAP IMAGE */
.map{
    width:100%;
    border-radius:15px;
    box-shadow:0 6px 18px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="container">

    <div class="time" id="slotTime"></div>

    <img src="images/map.jpeg" class="map">

</div>

<script>
const params = new URLSearchParams(window.location.search);
const slot = params.get("slot");

document.getElementById("slotTime").innerHTML = slot || "";
</script>

</body>
</html>
