<!DOCTYPE html>
<html>
<head>
<title>Ekskursijas karte</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-image: url("images/background.png");
    background-size: cover;
    margin: 0;

    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    max-width: 900px;
    margin: auto;
    background: rgba(255,255,255,0.9);
    padding: 20px;
    border-radius: 20px;
    text-align: center;

    display: flex;
    flex-direction: column;
    gap: 15px;
}

h2 {
    font-size: clamp(36px, 6vw, 48px);
    font-weight: 800;
    margin: 0;
    line-height: 1.1;
}

.time {
    font-size: clamp(40px, 7vw, 54px);
    font-weight: 900;
    color: #f55c00;
    margin: 0 0 10px 0;
    line-height: 1.1;
}

img {
    width: 100%;
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="container">

    <h2>Tiekamies!</h2>

    <div class="time" id="slotTime"></div>

    <img src="images/mapfinal.png" alt="Ekskursijas karte">

</div>

<script>
const params = new URLSearchParams(window.location.search);
const label = params.get("slot");

if (label) {
    const startTime = label.split(/[-–]/)[0].trim();
    document.getElementById("slotTime").textContent = startTime;
}
</script>

</body>
</html>
