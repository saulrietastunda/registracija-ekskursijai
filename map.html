<!DOCTYPE html>
<html>
<head>
<title>Ekskursijas karte</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-image: url("images/background.png");
    background-size: cover;
    margin: 0;

    /* ✅ CENTERING ADDED */
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* unchanged except centering works now */
.container {
    max-width: 900px;
    margin: auto;
    background: rgba(255,255,255,0.9);
    padding: 25px;
    border-radius: 20px;
    text-align: center;
}

h2 {
    font-size: 34px;
    font-weight: 800;
}

.time {
    font-size: 30px;
    font-weight: 900;
    color: #f55c00;
    margin: 15px 0;
}

img {
    width: 100%;
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="container">

    <h2>Tiekamies!</h2>

    <div class="time" id="slotTime"></div>

    <img src="images/map.jpeg">

</div>

<script>
const params = new URLSearchParams(window.location.search);
const slot = params.get("slot");

document.getElementById("slotTime").innerHTML = slot;
</script>

</body>
</html>
